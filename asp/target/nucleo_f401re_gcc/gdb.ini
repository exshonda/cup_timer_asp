# ST-LINK gdbserver (localhost:3333) へ接続する
target remote localhost:3333

set host-charset CP1252
set target-charset CP1252

# 既知の状態へリセットする
monitor reset

# 実行ファイル（asp.elf）をフラッシュへダウンロードする
load

# リセットしてリセットベクタで停止させる
monitor reset

# 低消費電力モードでもデバッグ接続を維持する (DBGMCU->CR)
set *0xE0042004 = (*0xE0042004) | 0x7

# そのまま実行を開始したい場合は次行のコメントを外す
# continue
